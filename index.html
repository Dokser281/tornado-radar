<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RADAR v14.2</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --bg: #000; --card: #0a0a0a; --border: #1a1a1a; --accent: #ff3b30; --safe: #34c759; --blue: #007aff; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* МОДАЛЬНОЕ ОКНО ОБНОВЛЕНИЙ */
        #update-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 20000;
            display: none; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box;
        }
        .modal-content {
            background: var(--card); border: 1px solid var(--border);
            padding: 25px; border-radius: 24px; max-width: 350px; width: 100%;
            text-align: left; box-shadow: 0 0 30px rgba(0,122,255,0.2);
        }
        .modal-content h2 { margin-top: 0; color: var(--blue); font-size: 18px; text-transform: uppercase; }
        .modal-content ul { padding-left: 20px; color: #ccc; font-size: 14px; margin-bottom: 20px; }
        .modal-content li { margin-bottom: 8px; }
        .close-btn {
            background: var(--blue); color: white; border: none; width: 100%;
            padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer;
        }

        .live-tag { position: absolute; top: 15px; right: 15px; display: flex; align-items: center; background: rgba(0,0,0,0.8); padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); z-index: 10001; }
        .live-dot { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; margin-right: 6px; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #main-ui { width: 100%; max-width: 900px; margin: 0 auto; padding: 10px; display: none; box-sizing: border-box; }
        #map { height: 55vh; border-radius: 20px; border: 1px solid var(--border); background: #000; margin-bottom: 10px; }
        
        .info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
        .info-card { background: var(--card); border: 1px solid var(--border); padding: 12px; border-radius: 15px; text-align: center; }
        .info-card b { font-size: 18px; color: var(--blue); display: block; margin-top: 4px; }
        
        .btn-start { background: var(--blue); color: #fff; border: none; padding: 20px 50px; border-radius: 15px; font-size: 18px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        
        .tornado-dot { width: 18px; height: 18px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 15px var(--accent); animation: pulse 0.8s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(2.5); opacity: 0; } 100% { transform: scale(1); opacity: 0; } }
    </style>
</head>
<body>

<div id="update-modal">
    <div class="modal-content">
        <h2>ОБНОВЛЕНИЕ v14.2</h2>
        <ul>
            <li>Добавлена зона поражения (красный радиус).</li>
            <li>Реализован след движения торнадо.</li>
            <li>Добавлен LIVE-индикатор в реальном времени.</li>
            <li>Оптимизирована шкала Фудзиты.</li>
        </ul>
        <button class="close-btn" onclick="closeUpdates()">ПОНЯТНО</button>
    </div>
</div>

<div class="live-tag"><div class="live-dot"></div><span style="font-size: 9px; font-weight: bold;">LIVE</span></div>

<div id="auth-screen">
    <div style="font-size: 60px; margin-bottom: 25px;">🌪️</div>
    <button class="btn-start" onclick="launch()">ОТКРЫТЬ РАДАР</button>
</div>

<div id="main-ui">
    <div id="status-box" style="background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 18px; text-align: center; margin-bottom: 10px;">
        <div id="status-text" style="font-size: 20px; font-weight: 900; text-transform: uppercase;">СКАНИРОВАНИЕ...</div>
    </div>
    <div id="map"></div>
    <div class="info-grid">
        <div class="info-card"><span>ВЕТЕР</span><b id="wind-val">--</b></div>
        <div class="info-card"><span>ДАВЛЕНИЕ</span><b id="press-val">--</b></div>
        <div class="info-card"><span>ШКАЛА</span><b id="fujita-rank" style="color:var(--accent)">F--</b></div>
    </div>
    <div style="padding: 10px; display: flex; justify-content: space-between; font-size: 10px; color: #333;">
        <span>РЕКОРД: <span id="max-val">0</span> КМ/Ч</span>
        <span>v14.2 STABLE</span>
    </div>
</div>

<script>
    const CURRENT_VERSION = "14.2";
    let map, damageZone, tornadoPath;
    let pathCoords = [];
    let maxWind = localStorage.getItem('maxW') || 0;
    document.getElementById('max-val').innerText = maxWind;

    function checkUpdates() {
        const lastVersion = localStorage.getItem('lastVersion');
        if (lastVersion !== CURRENT_VERSION) {
            document.getElementById('update-modal').style.display = 'flex';
        }
    }

    function closeUpdates() {
        localStorage.setItem('lastVersion', CURRENT_VERSION);
        document.getElementById('update-modal').style.display = 'none';
    }

    function launch() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-ui').style.display = 'block';
        checkUpdates();
        
        setTimeout(() => {
            map = L.map('map', { zoomControl: false }).setView([49.99, 36.23], 11);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            update();
            setInterval(update, 5000);
        }, 100);
    }

    async function update() {
        try {
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=49.99&longitude=36.23&current=weather_code,wind_gusts_10m,pressure_msl`);
            const data = await res.json();
            const c = data.current;
            const wind = Math.round(c.wind_gusts_10m);
            const press = Math.round(c.pressure_msl);

            document.getElementById('wind-val').innerText = wind + " КМ/Ч";
            document.getElementById('press-val').innerText = press + " HPA";
            
            let f = "F0";
            if(wind > 117) f = "F1"; if(wind > 181) f = "F2"; if(wind > 253) f = "F3";
            document.getElementById('fujita-rank').innerText = f;

            if (wind > maxWind) {
                maxWind = wind;
                localStorage.setItem('maxW', maxWind);
                document.getElementById('max-val').innerText = maxWind;
            }

            const txt = document.getElementById('status-text');
            if (wind > 100 || c.weather_code === 99) {
                txt.innerText = "ЕСТЬ ТОРНАДО!"; txt.style.color = "var(--accent)";
                if (!damageZone) damageZone = L.circle([49.99, 36.23], {color: 'red', fillOpacity: 0.2, radius: 2500, weight: 1}).addTo(map);
                
                pathCoords.push([49.99 + (Math.random()-0.5)*0.015, 36.23 + (Math.random()-0.5)*0.015]);
                if (tornadoPath) map.removeLayer(tornadoPath);
                tornadoPath = L.polyline(pathCoords, {color: 'red', weight: 3, opacity: 0.5}).addTo(map);
            } else {
                txt.innerText = "ТОРНАДО СЕГОДНЯ НЕ БУДЕТ"; txt.style.color = "var(--safe)";
                if (damageZone) { map.removeLayer(damageZone); damageZone = null; }
                if (tornadoPath) { map.removeLayer(tornadoPath); tornadoPath = null; pathCoords = []; }
            }
        } catch (e) { console.log("Error"); }
    }
</script>
</body>
</html>
