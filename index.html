<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RADAR v16.4</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --bg: #000; --card: #0a0a0a; --border: #1a1a1a; --accent: #ff3b30; --blue: #007aff; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        #auth-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #main-ui { width: 100%; max-width: 900px; margin: 0 auto; padding: 10px; display: none; box-sizing: border-box; height: 100vh; }
        
        #map { height: 70vh; border-radius: 20px; border: 1px solid var(--border); background: #000; margin-bottom: 15px; }
        
        .info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .info-card { background: var(--card); border: 1px solid var(--border); padding: 15px; border-radius: 15px; text-align: center; }
        .info-card b { font-size: 16px; color: var(--blue); display: block; margin-top: 5px; }
        .info-card span { font-size: 9px; opacity: 0.4; text-transform: uppercase; }
        
        .btn-start { background: var(--blue); color: #fff; border: none; padding: 20px 50px; border-radius: 15px; font-size: 18px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        
        .tornado-marker { 
            font-size: 40px; text-align: center; 
            animation: spin var(--speed, 2s) infinite linear; 
            filter: drop-shadow(0 0 15px red);
            cursor: pointer;
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .leaflet-popup-content-wrapper { background: var(--card); color: #fff; border: 1px solid var(--border); border-radius: 12px; font-family: sans-serif; }
        .leaflet-popup-tip { background: var(--card); }
    </style>
</head>
<body>

<div id="auth-screen">
    <div style="font-size: 60px; margin-bottom: 25px;">🌪️</div>
    <button class="btn-start" onclick="launch()">ОТКРЫТЬ РАДАР</button>
</div>

<div id="main-ui">
    <div id="map"></div>

    <div class="info-grid">
        <div class="info-card"><span>ОБЪЕКТЫ</span><b id="obj-val">0</b></div>
        <div class="info-card"><span>MAX ВЕТЕР</span><b id="wind-val">--</b></div>
        <div class="info-card"><span>СТАТУС</span><b id="f-val" style="color: var(--blue)">ACTIVE</b></div>
    </div>
</div>

<script>
    let map, activeTornadoes = {};
    const points = [
        {id: 1, lat: 35.4, lon: -97.5, name: 'Oklahoma', history: []}, 
        {id: 2, lat: 39.1, lon: -95.7, name: 'Kansas', history: []}, 
        {id: 3, lat: 49.9, lon: 36.2, name: 'Kharkiv', history: []}, 
        {id: 4, lat: 31.9, lon: -99.9, name: 'Texas', history: []},
        {id: 5, lat: 51.5, lon: -0.1, name: 'London', history: []},
        {id: 6, lat: 35.6, lon: 139.7, name: 'Tokyo', history: []}
    ];

    function getFujita(w) {
        if (w < 117) return "F0";
        if (w < 181) return "F1";
        if (w < 253) return "F2";
        return "F3+";
    }

    function launch() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-ui').style.display = 'block';
        if (!map) {
            map = L.map('map', { zoomControl: false }).setView([20, 0], 2);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            update();
            setInterval(update, 10000); 
        }
    }

    async function update() {
        let found = 0;
        let topW = 0;

        for (let p of points) {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${p.lat}&longitude=${p.lon}&current=wind_gusts_10m,wind_direction_10m&_=${Date.now()}`);
                const data = await res.json();
                const wind = Math.round(data.current.wind_gusts_10m);
                const angle = data.current.wind_direction_10m;

                if (wind > topW) topW = wind;

                if (wind > 30) { 
                    found++;
                    let spinSpeed = 2 - (wind / 150);
                    if(spinSpeed < 0.1) spinSpeed = 0.1;

                    const rad = angle * (Math.PI / 180);
                    p.lat += Math.cos(rad) * 0.02;
                    p.lon += Math.sin(rad) * 0.02;
                    
                    p.history.push([p.lat, p.lon]);
                    if(p.history.length > 10) p.history.shift();

                    const fRank = getFujita(wind);

                    if (activeTornadoes[p.id]) {
                        activeTornadoes[p.id].marker.setLatLng([p.lat, p.lon]);
                        activeTornadoes[p.id].marker._icon.style.setProperty('--speed', spinSpeed + 's');
                        activeTornadoes[p.id].line.setLatLngs(p.history);
                        activeTornadoes[p.id].marker.getPopup().setContent(`<b>${p.name}</b><br>Ветер: ${wind} км/ч<br>Ранг: ${fRank}`);
                    } else {
                        const m = L.marker([p.lat, p.lon], {
                            icon: L.divIcon({ 
                                className: 'none', 
                                html: `<div class="tornado-marker" style="--speed: ${spinSpeed}s">🌪️</div>`, 
                                iconSize: [40, 40] 
                            })
                        }).addTo(map).bindPopup(`<b>${p.name}</b><br>Ветер: ${wind} км/ч<br>Ранг: ${fRank}`);
                        
                        const l = L.polyline(p.history, {color: 'red', weight: 2, dashArray: '5, 10', opacity: 0.4}).addTo(map);
                        activeTornadoes[p.id] = { marker: m, line: l };
                    }
                } else {
                    if (activeTornadoes[p.id]) {
                        map.removeLayer(activeTornadoes[p.id].marker);
                        map.removeLayer(activeTornadoes[p.id].line);
                        delete activeTornadoes[p.id];
                        p.history = [];
                    }
                }
            } catch (e) {}
        }
        document.getElementById('obj-val').innerText = found;
        document.getElementById('wind-val').innerText = topW + " КМ/Ч";
    }
</script>
</body>
</html>
